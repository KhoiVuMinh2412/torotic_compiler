name: Tự động đóng gói và phát hành Backend

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # Bước 1: Checkout sử dụng phiên bản mới nhất (đã cập nhật runtime nội bộ)
      - name: Checkout code
        uses: actions/checkout@v4.2.2 # 👈 Cập nhật số bản vá cụ thể nếu cần, hoặc giữ v4 nếu GitHub tự resolve bản mới nhất sạch warning

      # Bước 2: Khởi tạo môi trường Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0 # 👈 Hoặc sử dụng tag đã fix lỗi runtime tương thích Node 24
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Các bước dưới giữ nguyên...
      - name: Install pkg
        run: npm install -g pkg

      - name: Build Binaries via pkg
        run: |
          mkdir -p dist
          pkg server.js --targets node24-win-x64 --output dist/torotic-backend-windows.exe
          pkg server.js --targets node24-linux-x64 --output dist/torotic-backend-linux

      # Sử dụng tag v2 mới nhất của release action
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/torotic-backend-windows.exe
            dist/torotic-backend-linux
          body: "Bản cập nhật tự động cho Torotic Backend Compiler."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
