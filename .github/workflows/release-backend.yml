name: Tự động đóng gói và phát hành Backend

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

       bondage- name: Install dependencies
        run: npm install

      # Bước 4: Đổi sang cài đặt gói pkg của cộng đồng duy trì
      - name: Install community-maintained pkg
        run: npm install -g @yao-pkg/pkg

      # Bước 5: Sử dụng lệnh `yao-pkg` thay vì `pkg` cũ
      - name: Build Binaries via pkg
        run: |
          mkdir -p dist
          yao-pkg server.js --targets node24-win-x64 --output dist/torotic-backend-windows.exe
          yao-pkg server.js --targets node24-linux-x64 --output dist/torotic-backend-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/torotic-backend-windows.exe
            dist/torotic-backend-linux
          body: "Bản cập nhật tự động cho Torotic Backend Compiler."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
